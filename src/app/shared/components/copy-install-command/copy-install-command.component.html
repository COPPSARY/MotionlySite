<div class="copy-install" [class.copy-install--unavailable]="copyState() === 'unavailable'">
  <code class="copy-install__command">{{ command }}</code>
  <button
    type="button"
    class="copy-install__button"
    (click)="onCopyClick()"
    [attr.aria-label]="copyState() === 'copied' ? 'Copied to clipboard' : 'Copy install command'"
  >
    @if (copyState() === 'copied') {
      Copied!
    } @else if (copyState() === 'unavailable') {
      Copy failed
    } @else {
      Copy
    }
  </button>
</div>
