<div class="copy-install" [class.copy-install--unavailable]="copyState() === 'unavailable'">
  <span class="copy-install__prompt" aria-hidden="true">$</span>
  <code class="copy-install__command">{{ command }}</code>
  <button
    type="button"
    class="copy-install__button"
    (click)="onCopyClick()"
    [attr.aria-label]="copyState() === 'copied' ? 'Copied to clipboard' : 'Copy install command'"
    [attr.title]="copyState() === 'copied' ? 'Copied' : 'Copy'"
  >
    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <rect x="8" y="8" width="10" height="10" rx="2" />
      <path d="M6 14H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7a2 2 0 0 1 2 2v1" />
    </svg>
  </button>
</div>
