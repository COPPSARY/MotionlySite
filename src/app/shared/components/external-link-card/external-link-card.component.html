<a
  class="link-card"
  [href]="resource.url"
  target="_blank"
  rel="noopener noreferrer"
>
  <span class="link-card__icon" aria-hidden="true">
    @switch (resource.icon) {
      @case ('book') {
        <svg class="link-card__icon-svg" lucideBook></svg>
      }
      @case ('github') {
        <svg
          class="link-card__icon-svg"
          viewBox="0 0 24 24"
          fill="currentColor"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M12 0C5.373 0 0 5.373 0 12c0 5.303 3.438 9.8 8.205 11.387.6.11.82-.26.82-.577 0-.285-.01-1.04-.016-2.04-3.338.725-4.042-1.61-4.042-1.61-.546-1.386-1.332-1.756-1.332-1.756-1.09-.744.082-.729.082-.729 1.205.085 1.84 1.237 1.84 1.237 1.07 1.834 2.807 1.304 3.492.997.108-.775.42-1.305.763-1.605-2.665-.303-5.466-1.332-5.466-5.93 0-1.31.469-2.382 1.236-3.222-.124-.303-.535-1.524.117-3.176 0 0 1.008-.323 3.302 1.23A11.5 11.5 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.29-1.553 3.297-1.23 3.297-1.23.655 1.652.244 2.873.12 3.176.77.84 1.235 1.912 1.235 3.222 0 4.61-2.807 5.624-5.48 5.92.43.372.814 1.103.814 2.222 0 1.606-.015 2.898-.015 3.293 0 .32.216.694.825.576C20.565 21.795 24 17.3 24 12c0-6.627-5.373-12-12-12Z"
          />
        </svg>
      }
      @case ('package') {
        <svg class="link-card__icon-svg" lucidePackage></svg>
      }
      @case ('play') {
        <svg class="link-card__icon-svg" lucidePlay></svg>
      }
      @default {
        <svg class="link-card__icon-svg" lucideExternalLink></svg>
      }
    }
  </span>
  <span class="link-card__body">
    <span class="link-card__title">{{ resource.title }}</span>
    <span class="link-card__description">{{ resource.description }}</span>
  </span>
</a>
