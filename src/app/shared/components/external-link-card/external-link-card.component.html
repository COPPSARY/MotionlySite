<a
  class="link-card"
  [href]="resource.url"
  target="_blank"
  rel="noopener noreferrer"
>
  <span class="link-card__icon" aria-hidden="true">{{ resource.icon }}</span>
  <span class="link-card__body">
    <span class="link-card__title">{{ resource.title }}</span>
    <span class="link-card__description">{{ resource.description }}</span>
  </span>
</a>
