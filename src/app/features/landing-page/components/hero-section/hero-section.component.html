<section class="hero">
  <div class="hero__content" [appScrollReveal]="0">
    <div class="hero__headline-wrap">
      <h1 class="hero__headline">
        <span>Create editable</span>
        <span>animations with AI.</span>
      </h1>
    </div>
    <p class="hero__subheadline">
      Motionly is an AI-native motion graphics editor that generates fully
      customizable animation projects.
    </p>

    <app-copy-install-command [command]="installCommand" />
    <div class="hero__proof" aria-label="Motionly package and launch links">
      <app-product-hunt-badge size="featured" />
    </div>
  </div>

  <div class="hero__preview" [appScrollReveal]="120">
    <img
      class="hero__preview-image"
      src="project-showcase.gif"
      width="960"
      height="540"
      alt="Motionly editing workflow preview"
    />
  </div>
</section>
