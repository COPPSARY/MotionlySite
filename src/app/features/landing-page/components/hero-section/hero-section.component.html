<section class="hero">
  <div class="hero__content" [appScrollReveal]="0">
    <h1 class="hero__headline">Motion graphics, generated by AI.</h1>
    <p class="hero__subheadline">
      Motionly is an AI-native motion graphics editor that turns plain-language
      prompts into polished, production-ready animations, no keyframes required.
    </p>

    <div class="hero__ctas">
      <app-product-hunt-badge size="featured" />

      <a
        class="btn btn--secondary"
        [href]="editorUrl"
        target="_blank"
        rel="noopener noreferrer"
      >
        Try the Editor
      </a>
    </div>

    <app-copy-install-command [command]="installCommand" />
  </div>

  <div class="hero__preview" [appScrollReveal]="120">
    <video
      #previewVideo
      class="hero__preview-video"
      [src]="demoVideoSrc"
      muted
      loop
      playsinline
      autoplay
      preload="metadata"
      aria-label="Motionly product demo"
    ></video>
  </div>
</section>
