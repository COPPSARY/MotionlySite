      <h2 class="showcase__heading">Use the agent you already work with.</h2>
      <p class="showcase__subheading">
        Install the Motionly skill for Codex
        <img class="showcase__inline-logo" src="assets/codex-color.svg" alt="" loading="lazy" />,

        <img class="showcase__inline-logo" src="assets/claude-code-color.svg" alt="" loading="lazy" />,
        Antigravity
        <img class="showcase__inline-logo" src="assets/antigravity-color.svg" alt="" loading="lazy" />,

        <a class="showcase__docs-link" [href]="skillDocsUrl" target="_blank" rel="noopener noreferrer">

      </p>
